name: Extract Metal Toolchain DMG

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-26
    steps:
      - name: Download MetalToolchain export bundle via xcodebuild
        run: |
          set -e
          mkdir -p $GITHUB_WORKSPACE/MetalExport
          xcodebuild -downloadComponent metalToolchain -exportPath $GITHUB_WORKSPACE/MetalExport/ 2>&1 | tail -20
          ls -la $GITHUB_WORKSPACE/MetalExport/
          echo "=== Bundle contents ==="
          find $GITHUB_WORKSPACE/MetalExport -maxdepth 4 -type f | head -30

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetalToolchain-exportedBundle
          path: MetalExport/
          retention-days: 1
