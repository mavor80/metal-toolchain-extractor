name: Extract Metal Toolchain DMG

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: macos-26
    steps:
      - name: Tar full MobileAsset directory
        run: |
          set -e
          ls -la /System/Library/AssetsV2/com_apple_MobileAsset_MetalToolchain/
          sudo tar -czf $GITHUB_WORKSPACE/metal-toolchain-full.tar.gz -C /System/Library/AssetsV2 com_apple_MobileAsset_MetalToolchain
          ls -la $GITHUB_WORKSPACE/metal-toolchain-full.tar.gz
          sudo chown $(whoami) $GITHUB_WORKSPACE/metal-toolchain-full.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetalToolchain-full
          path: metal-toolchain-full.tar.gz
          retention-days: 1
